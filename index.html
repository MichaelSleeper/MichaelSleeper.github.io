<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck Parade</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="playground" aria-label="Duck playground">
    <div class="button-row">
      <button id="spawnDuckBtn" type="button">Spawn Duck</button>
      <button id="spawnFiveBtn" type="button">Spawn 5</button>
      <button id="spawnTenBtn" type="button">Spawn 10</button>
      <button id="spawnTwentyFiveBtn" type="button">Spawn 25</button>
      <button id="spawnFiftyBtn" type="button">Spawn 50</button>
      <button id="spawnHundredBtn" type="button">Spawn 100</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
